<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カート｜blancblanc</title>
<style>
  :root{--ivory:#f6f4ef;--beige:#eae3d8;--pink:#ecdcd6;--pink-deep:#b9928a;--blue:#d2dde0;--text:#2c2824;--text-soft:#8c857b;--line:#e6dfd4;--white:#fff}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;color:var(--text);background:var(--ivory);line-height:1.8;font-size:14px;letter-spacing:.04em}
  a{color:inherit;text-decoration:none}
  .container{max-width:1080px;margin:0 auto;padding:0 24px}
  .topbar{background:var(--beige);color:var(--text-soft);font-size:11px;text-align:center;padding:7px 0;letter-spacing:.1em}
  header{position:sticky;top:0;z-index:50;background:rgba(246,244,239,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .header-inner{display:flex;align-items:center;justify-content:space-between;height:74px}
  .logo{display:inline-flex;flex-direction:column;align-items:center;line-height:1;font-family:"Century Gothic","Futura",sans-serif;font-weight:300;font-size:27px;letter-spacing:.1em;color:#a99e90}
  .logo i{font-style:normal;font-size:9px;letter-spacing:.42em;color:#c3bbb0;margin-top:7px;padding-left:.42em}
  .header-links{display:flex;gap:22px;font-size:12px;color:var(--text-soft)}
  h1.page-ttl{text-align:center;font-size:26px;font-weight:300;letter-spacing:.18em;padding:40px 0 8px}
  .page-sub{text-align:center;font-size:11px;letter-spacing:.3em;color:var(--text-soft);margin-bottom:36px}
  .layout{display:grid;grid-template-columns:1.6fr 1fr;gap:34px;padding-bottom:80px;align-items:start}
  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px}
  .panel h2{font-size:14px;letter-spacing:.1em;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .empty{text-align:center;color:var(--text-soft);padding:50px 0}
  .empty a{display:inline-block;margin-top:18px;padding:13px 40px;background:var(--text);color:#fff;border-radius:3px;font-size:12px;letter-spacing:.2em}
  .item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item-img{flex:0 0 84px;height:84px;border-radius:8px;overflow:hidden;background:var(--beige)}
  .item-img img{width:100%;height:100%;object-fit:cover}
  .item-main{flex:1;min-width:0}
  .item-name{font-size:13px;margin-bottom:4px}
  .item-color{font-size:11px;color:var(--text-soft)}
  .item-price{font-size:13px;font-weight:600;margin-top:6px}
  .item-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
  .qty{display:inline-flex;border:1px solid var(--line);border-radius:30px;overflow:hidden}
  .qty button{width:32px;height:34px;border:none;background:#fff;cursor:pointer;font-size:15px;color:var(--text)}
  .qty span{width:40px;text-align:center;line-height:34px;font-size:13px}
  .remove{background:none;border:none;color:var(--text-soft);font-size:11px;cursor:pointer;text-decoration:underline}
  .row{display:flex;justify-content:space-between;font-size:13px;padding:7px 0}
  .row.total{border-top:1px solid var(--line);margin-top:8px;padding-top:14px;font-size:17px;font-weight:600}
  .ship-note{font-size:11px;color:var(--text-soft);margin-top:4px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;letter-spacing:.08em;color:var(--text-soft);margin-bottom:5px}
  .field input,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;background:#fff}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--pink-deep)}
  .field.half{display:inline-block;width:calc(50% - 6px)}
  .field.half:first-child{margin-right:8px}
  .checkout-btn{width:100%;padding:16px;background:var(--text);color:#fff;border:none;border-radius:3px;font-size:13px;letter-spacing:.22em;cursor:pointer;transition:.25s;margin-top:6px}
  .checkout-btn:hover{background:var(--pink-deep)}
  .checkout-btn:disabled{opacity:.5;cursor:not-allowed}
  .secure{font-size:11px;color:var(--text-soft);text-align:center;margin-top:12px}
  .canceled{background:var(--pink);color:var(--pink-deep);text-align:center;font-size:12px;padding:10px;border-radius:8px;margin-bottom:18px}
  @media(max-width:820px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">¥10,000以上で全国送料無料／¥10,000未満は全国一律¥600</div>
<header>
  <div class="container header-inner">
    <a href="blancblanc.html" class="logo">blancblanc<i>DOG LIFESTYLE</i></a>
    <div class="header-links">
      <a href="goods.html">ALL ITEM</a>
      <a href="blancblanc.html">HOME</a>
    </div>
  </div>
</header>

<div class="container">
  <h1 class="page-ttl">CART</h1>
  <p class="page-sub">ショッピングカート</p>
  <div id="canceledMsg" class="canceled" style="display:none">決済をキャンセルしました。もう一度お試しいただけます。</div>

  <div class="layout">
    <div class="panel" id="cartPanel"><h2>カート内容</h2><div id="cartItems"></div></div>

    <div>
      <div class="panel" style="margin-bottom:20px">
        <h2>ご注文金額</h2>
        <div class="row"><span>小計</span><span id="sumSubtotal">¥0</span></div>
        <div class="row"><span>送料</span><span id="sumShipping">¥0</span></div>
        <div class="row total"><span>合計</span><span id="sumTotal">¥0</span></div>
        <p class="ship-note" id="shipNote"></p>
      </div>
      <div class="panel">
        <h2>お客様情報</h2>
        <form id="form">
          <div class="field"><label>お名前 *</label><input name="name" required></div>
          <div class="field"><label>メールアドレス *</label><input name="email" type="email" required></div>
          <div class="field"><label>電話番号</label><input name="phone"></div>
          <div class="field"><label>郵便番号</label><input name="postal" placeholder="1000001"></div>
          <div class="field"><label>ご住所 *</label><input name="address" required></div>
          <div class="field"><label>備考</label><textarea name="note" rows="2"></textarea></div>
          <button type="submit" class="checkout-btn" id="checkoutBtn">ご注文内容を確認する</button>
          <p class="secure" id="secureNote">次の画面でご注文内容をご確認いただけます</p>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="cart.js"></script>
<script src="products.js"></script>
<script>
  const yen = (n) => '¥' + Number(n).toLocaleString('ja-JP');
  let CFG = { freeShippingThreshold: 10000, shippingFee: 600, stripeEnabled: false };
  const byId = (id) => (window.PRODUCTS || []).find((p) => p.id === id);
  const priceOf = (p, label) => {
    if (Array.isArray(p.variants) && p.variants.length) {
      const v = p.variants.find((v) => v.label === label);
      return (v ? v.price : p.variants[0].price);
    }
    return p.price;
  };

  fetch('/api/config').then((r) => r.json()).then((c) => {
    CFG = c;
    if (!c.stripeEnabled) document.getElementById('secureNote').textContent = '※ 現在はテストモード（決済なし）で注文を確定します';
    render();
  }).catch(render);

  if (new URLSearchParams(location.search).get('canceled')) document.getElementById('canceledMsg').style.display = 'block';

  function render() {
    const items = Cart.items();
    const wrap = document.getElementById('cartItems');
    if (!items.length) {
      wrap.innerHTML = '<div class="empty">カートは空です。<br><a href="goods.html">商品を見る</a></div>';
      document.getElementById('checkoutBtn').disabled = true;
      updateSummary(0);
      return;
    }
    document.getElementById('checkoutBtn').disabled = false;
    let subtotal = 0;
    wrap.innerHTML = items.map((it) => {
      const p = byId(it.id); if (!p) return '';
      const unit = priceOf(p, it.color);
      const line = unit * it.qty; subtotal += line;
      const img = (p.imgs || [])[0] || '';
      return `<div class="item">
        <div class="item-img"><img src="${img}" alt=""></div>
        <div class="item-main">
          <div class="item-name">${p.name}</div>
          ${it.color ? `<div class="item-color">${it.color}</div>` : ''}
          <div class="item-price">${yen(unit)}</div>
          <div class="item-bottom">
            <span class="qty">
              <button onclick="chg('${it.id}','${it.color || ''}',-1)">−</button>
              <span>${it.qty}</span>
              <button onclick="chg('${it.id}','${it.color || ''}',1)">＋</button>
            </span>
            <button class="remove" onclick="rm('${it.id}','${it.color || ''}')">削除</button>
          </div>
        </div>
      </div>`;
    }).join('');
    updateSummary(subtotal);
  }

  function updateSummary(subtotal) {
    const shipping = subtotal > 0 && subtotal < CFG.freeShippingThreshold ? CFG.shippingFee : 0;
    document.getElementById('sumSubtotal').textContent = yen(subtotal);
    document.getElementById('sumShipping').textContent = shipping ? yen(shipping) : '無料';
    document.getElementById('sumTotal').textContent = yen(subtotal + shipping);
    const note = document.getElementById('shipNote');
    if (subtotal > 0 && subtotal < CFG.freeShippingThreshold) {
      note.textContent = `あと ${yen(CFG.freeShippingThreshold - subtotal)} で送料無料`;
    } else note.textContent = '';
  }

  window.chg = (id, color, d) => {
    const it = Cart.items().find((i) => i.id === id && (i.color || '') === color);
    if (it) Cart.setQty(id, color || null, it.qty + d);
    render();
  };
  window.rm = (id, color) => { Cart.remove(id, color || null); render(); };

  document.getElementById('form').addEventListener('submit', (e) => {
    e.preventDefault();
    if (!Cart.items().length) return;
    const fd = new FormData(e.target);
    const customer = Object.fromEntries(fd.entries());
    sessionStorage.setItem('bb_customer', JSON.stringify(customer));
    location.href = 'confirm.html';
  });
</script>
</body>
</html>
